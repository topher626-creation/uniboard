

services:
  db:
    image: postgres:16-alpine
    container_name: uniboard-db
    restart: always
    environment:
      POSTGRES_DB: uniboard
      POSTGRES_USER: uniboard
      POSTGRES_PASSWORD: uniboardpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uniboard -d uniboard"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
