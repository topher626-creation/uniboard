version: '3.8'

services:
  mysql-db:
    image: mysql:8.3
    container_name: uniboard-mysql
    restart: always
    environment:
      MYSQL_DATABASE: uniboard
      MYSQL_ROOT_PASSWORD: mysqlpass
      MYSQL_USER: uniboard
      MYSQL_PASSWORD: uniboardpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
    driver: local

